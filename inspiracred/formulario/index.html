<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Simule seu crédito com garantia de imóvel com a InspiraCred em poucos passos." />
    <meta name="theme-color" content="#061a42" />
    <title>Simulação Home Equity | InspiraCred</title>
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Simulação Home Equity | InspiraCred" />
    <meta property="og:description" content="Responda algumas perguntas e receba atendimento de um especialista InspiraCred." />
    <meta property="og:image" content="/homeequity/img/hero-home.webp" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />

    <script>window.IC_PAGE = "home_equity_form";</script>
    <script src="/assets/js/track.js" defer></script>
    <script src="script.js" defer></script>
  </head>

  <body>
    <main class="form-page" data-section="formulario-home-equity">
      <img class="page-bg" src="/homeequity/img/hero-home.webp" alt="" aria-hidden="true" />
      <div class="page-shade" aria-hidden="true"></div>

      <header class="topbar">
        <a class="brand" href="/" target="_blank" rel="noopener noreferrer" aria-label="InspiraCred">
          <img src="/assets/img/landing-logo-ref.png" alt="InspiraCred" />
        </a>
      </header>

      <section class="stage" aria-label="Formulário de simulação Home Equity">
        <aside class="context-panel">
          <h1>Descubra quanto crédito seu imóvel pode liberar.</h1>
          <p>Faça uma simulação de crédito com garantia de imóvel em poucos passos.</p>
        </aside>

        <form class="typeform-card" id="typeform-home-equity" novalidate>
          <div class="question-shell" id="question-shell" aria-live="polite"></div>

          <div class="form-footer">
            <div class="progress-block" aria-hidden="true">
              <span class="progress-label" id="progress-label">Pergunta 1 de 5</span>
              <div class="progress-steps" id="progress-steps">
                <span class="pstep"></span>
                <span class="pstep"></span>
                <span class="pstep"></span>
                <span class="pstep"></span>
                <span class="pstep"></span>
              </div>
            </div>

            <div class="nav-actions">
              <button class="ghost-button back-button" id="back-button" type="button" aria-label="Voltar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
              </button>
              <button class="primary-button" id="next-button" type="button">Continuar</button>
            </div>
          </div>
        </form>
      </section>

      <footer class="legal-note">
        Ao enviar, você concorda com a
        <a href="/politica-de-privacidade.html" target="_blank" rel="noopener noreferrer">Política de Privacidade</a>
        e os <a href="/termos-de-uso.html" target="_blank" rel="noopener noreferrer">Termos de Uso</a>.
      </footer>
    </main>
  </body>
</html>
